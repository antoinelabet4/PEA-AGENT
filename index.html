// ── Polyfill window.storage via localStorage ──
window.storage = {
  get: async (key) => {
    const value = localStorage.getItem(key);
    return value !== null ? { value } : null;
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    return true;
  },
  remove: async (key) => {
    localStorage.removeItem(key);
    return true;
  }
};

function parseAllocation(content) {
  const match = content.match(/<ALLOCATION_JSON>([\s\S]*?)<\/ALLOCATION_JSON>/);
  if (!match) return null;
  try { return JSON.parse(match[1].trim()); } catch { return null; }
}

function stripJson(content) {
  return content.replace(/<ALLOCATION_JSON>[\s\S]*?<\/ALLOCATION_JSON>/, "").trim();
}

function TypingIndicator() {

    <div style={{ display: "flex", alignItems: "center", gap: "6px", padding: "16px 20px" }}>

      ))}
    </div>
  );
}

function EditableCell({ value, onSave, suffix = "" }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const ref = useRef();
  useEffect(() => { if (editing) ref.current && ref.current.focus(); }, [editing]);
  if (editing) {
    return (
      <input ref={ref} type="number" value={val}
        onChange={e => setVal(e.target.value)}
        onBlur={() => { onSave(parseFloat(val) || 0); setEditing(false); }}
        onKeyDown={e => { if (e.key === "Enter") { onSave(parseFloat(val) || 0); setEditing(false); } }}
        style={{ width: 80, background: "rgba(201,169,110,0.15)", border: "1px solid #c9a96e", borderRadius: 4, color: "#c9a96e", padding: "2px 6px", fontSize: 13, fontFamily: "monospace", textAlign: "right", outline: "none" }} />
    );
  }
  return (
    <span onClick={() => { setVal(value); setEditing(true); }} title="Cliquer pour modifier"
      style={{ cursor: "pointer", borderBottom: "1px dashed rgba(201,169,110,0.4)", paddingBottom: 1, fontFamily: "monospace", fontSize: 13 }}>
      {typeof value === "number" ? value.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : value}{suffix}
    </span>
  );
}

// ── Camembert SVG ──
function PieChart({ lines, total }) {
  if (!lines || lines.length === 0 || total <= 0) return null;

  // Agréger par catégorie
  const bycat = {};
  lines.forEach(l => {
    const cat = l.categorie || "Autre";
    bycat[cat] = (bycat[cat] || 0) + l.valActuelle;
  });
  const slices = Object.entries(bycat).map(([cat, val]) => ({
    cat, val, pct: (val / total) * 100, color: CAT_COLORS[cat] || "#aaa"
  })).sort((a, b) => b.val - a.val);

  // Calcul des arcs SVG
  const cx = 90, cy = 90, r = 75;
  let cumul = 0;
  const paths = slices.map(s => {
    const start = cumul;
    cumul += s.pct / 100;
    const a1 = (start * 2 * Math.PI) - Math.PI / 2;
    const a2 = (cumul * 2 * Math.PI) - Math.PI / 2;
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    const large = s.pct > 50 ? 1 : 0;
    return { ...s, d: `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z` };
  });

  return (
    <div style={{ background: "rgba(15,15,25,0.8)", border: "1px solid rgba(201,169,110,0.2)", borderRadius: 12, padding: "20px 24px", marginBottom: 16, display: "flex", alignItems: "center", gap: 32 }}>
      <div>
        <div style={{ fontSize: 11, color: "#c9a96e", letterSpacing: "0.1em", fontWeight: "bold", marginBottom: 14 }}>RÉPARTITION PAR CATÉGORIE</div>
        <svg width={180} height={180} viewBox="0 0 180 180">
          {paths.map((p, i) => (
            <path key={i} d={p.d} fill={p.color} opacity={0.85} stroke="#0d1117" strokeWidth={1.5}>
              <title>{p.cat} — {p.pct.toFixed(1)}%</title>
            </path>
          ))}
          <circle cx={cx} cy={cy} r={38} fill="#0d1117" />
          <text x={cx} y={cy - 6} textAnchor="middle" fill="#c9a96e" fontSize={13} fontWeight="bold">{slices.length}</text>
          <text x={cx} y={cy + 10} textAnchor="middle" fill="#888" fontSize={9}>lignes</text>
        </svg>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, flex: 1 }}>
        {slices.map((s, i) => (
          <div key={i}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 12 }}>
              <span style={{ display: "flex", alignItems: "center", gap: 7 }}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: s.color, flexShrink: 0, display: "inline-block" }} />
                <span style={{ color: "#ccc" }}>{s.cat}</span>
              </span>
              <span style={{ fontFamily: "monospace", color: s.color, fontWeight: "bold" }}>{s.pct.toFixed(1)}%</span>
            </div>
            <div style={{ height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 2 }}>
              <div style={{ width: `${s.pct}%`, height: "100%", background: s.color, borderRadius: 2, opacity: 0.8 }} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Courbe de performance SVG ──
// ── Courbe de performance + benchmarks (normalisés en %) ──
function PerfChart({ history, benchmarks }) {
  if (!history || history.length < 2) return (
    <div style={{ background: "rgba(15,15,25,0.8)", border: "1px solid rgba(201,169,110,0.2)", borderRadius: 12, padding: "20px 24px", marginBottom: 16, textAlign: "center" }}>
      <div style={{ fontSize: 11, color: "#c9a96e", letterSpacing: "0.1em", fontWeight: "bold", marginBottom: 10 }}>HISTORIQUE DE PERFORMANCE</div>
      <div style={{ fontSize: 12, color: "#555", paddingBottom: 8 }}>Les données s'accumuleront au fil des jours. Revenez demain pour voir votre première courbe.</div>
    </div>
  );

  const W = 700, H = 160, pad = { t: 20, b: 30, l: 52, r: 20 };

  // Normaliser le portefeuille en %
  const first = history[0].val;
  const portPct = history.map(p => ((p.val - first) / first) * 100);

  // Séries benchmark normalisées
  const series = [{ label: "Mon PEA", pcts: portPct, color: "#c9a96e", width: 2.5 }];
  const bmColors = { "MSCI World (CW8)": "#6a8ec9", "CAC 40": "#9e6b4a" };
  if (benchmarks) {
    Object.entries(benchmarks).forEach(([name, pts]) => {
      if (pts && pts.length >= 2) {
        const f0 = pts[0];
        series.push({ label: name, pcts: pts.map(v => ((v - f0) / f0) * 100), color: bmColors[name] || "#888", width: 1.5 });
      }
    });
  }

  // Plage Y globale
  const allPcts = series.flatMap(s => s.pcts);
  const minP = Math.min(...allPcts, 0), maxP = Math.max(...allPcts, 0);
  const rangeP = maxP - minP || 1;
  const toY = v => pad.t + (1 - (v - minP) / rangeP) * (H - pad.t - pad.b);
  const zeroY = toY(0);

  const toXN = (i, total) => pad.l + (i / Math.max(total - 1, 1)) * (W - pad.l - pad.r);

  // Labels Y
  const yTicks = [minP, 0, maxP].filter((v, i, a) => a.indexOf(v) === i);
  const xLabels = [0, Math.floor(history.length / 2), history.length - 1].map(i => ({
    x: toXN(i, history.length), label: history[i].date.slice(5)
  }));

  const portLast = portPct[portPct.length - 1];
  const portColor = portLast >= 0 ? "#4a9e6b" : "#e05555";

  return (
    <div style={{ background: "rgba(15,15,25,0.8)", border: "1px solid rgba(201,169,110,0.2)", borderRadius: 12, padding: "20px 24px", marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: "#c9a96e", letterSpacing: "0.1em", fontWeight: "bold" }}>PERFORMANCE vs BENCHMARKS</div>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", justifyContent: "flex-end" }}>
          {series.map((s, i) => {
            const last = s.pcts[s.pcts.length - 1];
            return (
              <span key={i} style={{ fontSize: 11, fontFamily: "monospace", display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ width: 14, height: 2, background: s.color, display: "inline-block", borderRadius: 1 }} />
                <span style={{ color: "#888" }}>{s.label}</span>
                <span style={{ color: last >= 0 ? "#4a9e6b" : "#e05555", fontWeight: "bold" }}>{last >= 0 ? "+" : ""}{last.toFixed(2)}%</span>
              </span>
            );
          })}
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto" }}>
        <defs>
          <linearGradient id="portGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={portColor} stopOpacity="0.2" />
            <stop offset="100%" stopColor={portColor} stopOpacity="0" />
          </linearGradient>
        </defs>
        {/* Grid Y */}
        {yTicks.map((v, i) => (
          <g key={i}>
            <line x1={pad.l} y1={toY(v)} x2={W - pad.r} y2={toY(v)}
              stroke={v === 0 ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.04)"} strokeWidth={v === 0 ? 1 : 1} strokeDasharray={v === 0 ? "none" : "3,4"} />
            <text x={pad.l - 4} y={toY(v) + 4} textAnchor="end" fill={v === 0 ? "#666" : "#444"} fontSize={8}>{v >= 0 ? "+" : ""}{v.toFixed(1)}%</text>
          </g>
        ))}
        {/* Aire portefeuille */}
        <polygon
          points={`${toXN(0, history.length)},${zeroY} ` + portPct.map((v, i) => `${toXN(i, history.length)},${toY(v)}`).join(" ") + ` ${toXN(history.length - 1, history.length)},${zeroY}`}
          fill="url(#portGrad)" />
        {/* Lignes benchmarks puis portefeuille (en dernier pour être au-dessus) */}
        {series.slice(1).map((s, si) => (
          <polyline key={si}
            points={s.pcts.map((v, i) => `${toXN(i, s.pcts.length)},${toY(v)}`).join(" ")}
            fill="none" stroke={s.color} strokeWidth={s.width} strokeLinejoin="round" strokeDasharray="5,3" opacity={0.7} />
        ))}
        <polyline
          points={portPct.map((v, i) => `${toXN(i, portPct.length)},${toY(v)}`).join(" ")}
          fill="none" stroke="#c9a96e" strokeWidth={2.5} strokeLinejoin="round" />
        {/* Labels X */}
        {xLabels.map((l, i) => (
          <text key={i} x={l.x} y={H - 4} textAnchor="middle" fill="#444" fontSize={8}>{l.label}</text>
        ))}
        {/* Point final portefeuille */}
        <circle cx={toXN(portPct.length - 1, portPct.length)} cy={toY(portLast)} r={4} fill={portColor} />
      </svg>
    </div>
  );
}

function ApiKeySetup({ onSave }) {
  const [key, setKey] = useState("");

  // ── Fetch benchmarks MSCI World + CAC 40 depuis Yahoo Finance ──
  async function fetchBenchmarks(startDate) {
    const symbols = { "MSCI World (CW8)": "CW8.PA", "CAC 40": "^FCHI" };
    const result = {};
    const startTs = Math.floor(new Date(startDate).getTime() / 1000);

        const r = await fetch(url, { headers: { Accept: "application/json" } });
        if (!r.ok) return;

        const closes = d?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
        if (!closes || closes.length < 2) return;
        // Filtrer les null
        result[name] = closes.filter(v => v != null && v > 0);
      } catch {}
    }));

  useEffect(() => {

  // ── ISIN mapping Euronext Paris (ETFs PEA courants) ──
  const ISIN_MAP = {
    "CW8":"FR0010315770","EWLD":"FR0011869353","PAEEM":"FR0013412020",
    "PANX":"FR0013412285","LYPS":"FR0011871128","PSP5":"FR0011550185",
    "LYXIB":"FR0010814343","LCWD":"FR0011882364","BNPP":"FR0000131104",
    "AIR":"FR0000120073","MC":"FR0000121014","OR":"FR0000120321",
    "SAN":"FR0000120578","TTE":"FR0000120271","SU":"FR0000121972",
  };
  function getIsin(ticker) {
    const base = ticker.replace(".PA","").toUpperCase();
    return ISIN_MAP[ticker.toUpperCase()] || ISIN_MAP[base] || null;
  }

  // ── Sanity check : certaines sources stockent les prix en eurocents (×100) ──
  function sanitizePrice(raw, ticker) {
    const p = parseFloat(raw);
    if (!p || isNaN(p) || p <= 0) return null;
    // Indices (CAC 40, Eurostoxx) et forex : pas d'ajustement
    if (ticker && (ticker.startsWith("^") || ticker.includes("=X"))) return p;
    // ETF/Actions : fourchette raisonnable 1 € – 5 000 €
    if (p > 5000) {
      // Probablement stocké en eurocents — on divise par 100
      const adj = p / 100;
      return (adj >= 1 && adj <= 5000) ? adj : null;
    }
    return p >= 0.1 ? p : null;
  }

  // Source 1 : Yahoo Finance via corsproxy.io (résout le blocage CORS depuis file://)
  async function fetchPriceYahoo(ticker) {
    const sym = ticker.includes(".") ? ticker : ticker + ".PA";
    const yahooUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;
    const r = await fetch(proxyUrl, { headers: { "Accept": "application/json" } });
    if (!r.ok) throw new Error(`Yahoo HTTP ${r.status}`);
    const d = await r.json();
    if (d.chart?.error) throw new Error("Yahoo: " + d.chart.error.description);
    const meta = d?.chart?.result?.[0]?.meta;
    if (!meta?.regularMarketPrice) throw new Error("Yahoo: prix absent");
    const price = sanitizePrice(meta.regularMarketPrice, ticker);
    if (!price) throw new Error(`Yahoo: prix hors plage (${meta.regularMarketPrice})`);
    return { price, currency: meta.currency || "EUR", change: meta.regularMarketChangePercent, source: "Yahoo Finance" };
  }

  // Source 2 : Euronext Live API via corsproxy.io
  async function fetchPriceEuronext(ticker) {
    const isin = getIsin(ticker);
    if (!isin) throw new Error("Euronext: ISIN inconnu pour " + ticker);
    const euronextUrl = `https://live.euronext.com/en/pd/data/quote?isinCode=${isin}&selectedMep=1&ulCode=&type=ETFS`;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(euronextUrl)}`;
    const r = await fetch(proxyUrl, { headers: { "Accept": "application/json", "X-Requested-With": "XMLHttpRequest" } });
    if (!r.ok) throw new Error(`Euronext HTTP ${r.status}`);
    const d = await r.json();
    // La structure Euronext peut varier : array ou objet direct
    const raw =
      d?.last ?? d?.lastPrice ?? d?.last_price ??
      d?.data?.last ?? d?.data?.lastPrice ??
      d?.[0]?.last ?? d?.[0]?.lastPrice ?? d?.[0]?.last_price ?? d?.[0]?.intraday_close ??
      d?.instr?.last ?? d?.price ?? d?.[0]?.price;
    const price = sanitizePrice(raw, ticker);
    if (!price) throw new Error(`Euronext: prix absent (reçu: ${JSON.stringify(raw)})`);
    return { price, currency: "EUR", source: "Euronext" };
  }

  // Source 3 : Boursorama scraping HTML via corsproxy.io (avec sanity check)
  async function fetchPriceBoursorama(ticker) {
    const base = ticker.replace(".PA","").toUpperCase();
    const boursoSym = "1r" + base;
    const targetUrl = `https://www.boursorama.com/cours/${boursoSym}/`;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
    const r = await fetch(proxyUrl, { headers: { "User-Agent": "Mozilla/5.0" } });
    if (!r.ok) throw new Error(`Boursorama/proxy HTTP ${r.status}`);
    const html = await r.text();
    if (!html || html.length < 500) throw new Error("Boursorama: page vide");
    const patterns = [
      /itemprop="price"\s+content="([0-9]+[.,][0-9]+)"/i,
      /data-real-value="([0-9]+[.,][0-9]+)"/,
      /"regularMarketPrice"\s*:\s*([0-9]+\.?[0-9]*)/,
      /class="[^"]*c-instrument--last[^"]*"[^>]*>([0-9\s]+[,\.][0-9]+)</i,
      /data-value="([0-9]+[.,][0-9]+)"/,
      /"price":"([0-9]+\.?[0-9]*)"/
    ];
    for (const pat of patterns) {
      const m = html.match(pat);
      if (m) {
        const raw = parseFloat(m[1].replace(/\s/g,"").replace(",","."));
        const price = sanitizePrice(raw, ticker);
        if (price) return { price, currency: "EUR", source: "Boursorama" };
      }
    }
    throw new Error(`Boursorama: prix introuvable (${html.length} octets reçus)`);
  }

  function medianOf(prices) {
    const s = [...prices].sort((a,b)=>a-b);
    const m = Math.floor(s.length/2);
    return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
  }

  async function fetchPricesForTicker(ticker) {
    if (ticker === "CASH") return null;
    const [r1, r2, r3] = await Promise.allSettled([
      fetchPriceYahoo(ticker),
      fetchPriceEuronext(ticker),
      fetchPriceBoursorama(ticker)
    ]);
    const ok = [r1,r2,r3].filter(r=>r.status==="fulfilled").map(r=>r.value);
    const errors = [r1,r2,r3].filter(r=>r.status==="rejected").map(r=>r.reason?.message);
    if (ok.length === 0) throw new Error("Toutes sources KO : " + errors.join(" | "));
    const median = medianOf(ok.map(s=>s.price));
    return { price: median, sources: ok.map(s=>`${s.source}: ${s.price.toFixed(2)}`), errors, count: ok.length };
  }

  async function refreshAllPrices() {
    const tickers = lines.filter(l => l.ticker !== "CASH");
    if (tickers.length === 0) return;
    const loadingState = {};
    tickers.forEach(l => { loadingState[l.ticker] = { loading: true }; });
    setPriceStatus(loadingState);
    for (const l of tickers) {
      try {
        const result = await fetchPricesForTicker(l.ticker);
        if (result) {
          setPriceStatus(prev => ({ ...prev, [l.ticker]: { price: result.price, sources: result.sources, errors: result.errors, count: result.count, loading: false } }));
          setLines(prev => prev.map(line => {
            if (line.ticker !== l.ticker) return line;
            if (line._pendingQte && line._montant > 0) {
              // Calcul de la vraie quantité : montant alloué ÷ prix unitaire réel
              // PRU estimé = prix actuel (l'utilisateur saisira son vrai prix d'achat)
              const newQte = Math.round(line._montant / result.price * 10000) / 10000;
              return { ...line, prixActuel: result.price, qte: newQte, pru: result.price, _pendingQte: false, _pruEstimated: true };
            }
            return { ...line, prixActuel: result.price };
          }));
        }
      } catch (e) {
        setPriceStatus(prev => ({ ...prev, [l.ticker]: { error: e.message, loading: false } }));
      }
    }
  }

  // ── Panneau de test des sources (pour diagnostic) ──
  const [showTestPanel, setShowTestPanel] = useState(false);
  const [testResults, setTestResults] = useState(null);
  const [testRunning, setTestRunning] = useState(false);

  async function runSourceTests() {

    setTestResults(null);
    const testTicker = "CW8"; // ticker de référence pour les tests
    const results = {};
    const tests = [
      { name: "Yahoo Finance (query2)", fn: () => fetchPriceYahoo(testTicker) },
      { name: "Euronext Live API",      fn: () => fetchPriceEuronext(testTicker) },
      { name: "Boursorama (scraping)",  fn: () => fetchPriceBoursorama(testTicker) },
    ];
    for (const t of tests) {
      const start = Date.now();
      try {
        const r = await t.fn();
        results[t.name] = { ok: true, price: r.price, ms: Date.now()-start };
      } catch(e) {
        results[t.name] = { ok: false, error: e.message, ms: Date.now()-start };
      }
    }
    setTestResults(results);
    setTestRunning(false);
  }

  // ── Streaming SSE vers l'API Anthropic ──
  async function streamClaude(systemPrompt, userMessages, onChunk) {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-opus-4-5-20251101",
        max_tokens: 4096,
        stream: true,
        system: systemPrompt,
        messages: userMessages
      })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || "Erreur API");
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    let buffer = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") continue;
        try {
          const json = JSON.parse(data);
          if (json.type === "content_block_delta" && json.delta?.type === "text_delta") {
            fullText += json.delta.text;
            onChunk(fullText);
          }
        } catch {}
      }
    }
    return fullText;
  }

  async function sendMessage(text) {
    const ts = new Date().toLocaleString('fr-FR');
    const newMessages = [...messages, { role: "user", content: text, ts }];
    setMessages(newMessages);
    setInput("");
    setLoading(true);

    // Récupérer les données marché live (3 sources) avant d'envoyer
    setMarketFetching(true);
    let liveMarketData = "Données marché temporairement indisponibles.";
    try { liveMarketData = await fetchLiveMarketContext(); } catch {}
    setMarketFetching(false);

    const liveSystemPrompt = SYSTEM_PROMPT.replace("{{LIVE_MARKET_DATA}}", liveMarketData);

    // Ajoute un message vide qui sera rempli au fil du stream
    setMessages(prev => [...prev, { role: "assistant", content: "", ts: new Date().toLocaleString('fr-FR'), streaming: true }]);
    try {
      await streamClaude(
        liveSystemPrompt,
        newMessages.map(m => ({ role: m.role, content: m.content })),
        (txt) => {
          setMessages(prev => {
            const updated = [...prev];
            updated[updated.length - 1] = { ...updated[updated.length - 1], content: txt };
            return updated;
          });
        }
      );
      setMessages(prev => {
        const updated = [...prev];
        updated[updated.length - 1] = { ...updated[updated.length - 1], streaming: false };
        return updated;
      });
    } catch (e) {
      setMessages(prev => {
        const updated = [...prev];
        updated[updated.length - 1] = {
          role: "assistant",
          content: `❌ Erreur : ${e.message}\n\nVérifiez votre clé API (bouton 🔑 en haut à droite).`,
          ts: new Date().toLocaleString('fr-FR'),
          streaming: false
        };
        return updated;
      });
    }
    setLoading(false);
  }

                  const col = Math.abs(l.ecartCible) > 3 ? "#e09955" : Math.abs(l.ecartCible) > 1 ? "#e0d555" : "#4a9e6b";
                  return (
                    <div key={l.id} style={{ marginBottom: 14 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                        <span style={{ fontSize: 13 }}>
                          <span style={{ color: "#c9a96e", fontFamily: "monospace", fontWeight: "bold" }}>{l.ticker}</span>
                          {" "}<span style={{ color: "#888", fontSize: 12 }}>{l.nom}</span>
                        </span>
                        <span style={{ fontSize: 12, fontFamily: "monospace", color: col }}>
                          {l.pctActuel.toFixed(1)}% / {l.cible}% ({l.ecartCible >= 0 ? "+" : ""}{l.ecartCible.toFixed(1)}%)
                        </span>
                      </div>
                      <div style={{ height: 6, background: "rgba(255,255,255,0.05)", borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ width: `${Math.min(l.pctActuel, 100)}%`, height: "100%", background: `linear-gradient(90deg,${col}66,${col})`, borderRadius: 3 }} />
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <button onClick={runRealloc} disabled={reallocLoading}
                  style={{ background: reallocLoading ? "rgba(201,169,110,0.2)" : "linear-gradient(135deg,#c9a96e,#8b6914)", border: "none", borderRadius: 12, padding: "14px 40px", cursor: reallocLoading ? "not-allowed" : "pointer", color: reallocLoading ? "#888" : "#000", fontWeight: "bold", fontSize: 15, fontFamily: "inherit", letterSpacing: "0.05em" }}>
                  {reallocLoading ? "⏳ Analyse en cours…" : "🔄 Lancer l'analyse de rééquilibrage IA"}
                </button>
              </div>
              {reallocResult && (
                <div style={{ background: "rgba(15,15,25,0.9)", border: "1px solid rgba(201,169,110,0.3)", borderRadius: 12, padding: 24 }}>
                  <div style={{ fontSize: 11, color: "#c9a96e", letterSpacing: "0.1em", marginBottom: 12, fontWeight: "bold" }}>✦ RECOMMANDATIONS</div>
                  <div style={{ fontSize: 14, lineHeight: 1.8, color: "#e8e0d0", whiteSpace: "pre-wrap", fontFamily: "Georgia,serif" }}>{reallocResult}</div>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* ── CHAT ── */}
      {activeTab === "chat" && (
        <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 120px)" }}>
          <div style={{ padding: "12px 16px", display: "flex", gap: 8, overflowX: "auto", borderBottom: "1px solid rgba(201,169,110,0.1)", background: "rgba(0,0,0,0.2)" }}>
            {QUICK_PROMPTS.map((p, i) => (
              <button key={i} onClick={() => sendMessage(p.text)} disabled={loading}
                style={{ flexShrink: 0, background: "rgba(201,169,110,0.07)", border: "1px solid rgba(201,169,110,0.25)", borderRadius: 20, padding: "7px 14px", cursor: "pointer", fontSize: 12, color: "#c9a96e", fontFamily: "inherit", whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 6 }}>
                <span>{p.icon}</span>{p.label}
              </button>
            ))}
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "24px 20px" }}>
            <div style={{ maxWidth: 760, margin: "0 auto" }}>
              {messages.map((msg, i) => (
                <div key={i} className="msg-in">
                  <Message msg={msg} onImport={importAllocation} />
                </div>
              ))}
              {marketFetching && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, padding: "8px 14px", background: "rgba(74,158,107,0.08)", border: "1px solid rgba(74,158,107,0.2)", borderRadius: 10, fontSize: 12, color: "#4a9e6b" }}>
                  <span style={{ animation: "spin 1.5s linear infinite", display: "inline-block" }}>📡</span>
                  Récupération des données marché live (Yahoo Finance · Euronext · ECB)…
                </div>
              )}
              {loading && (
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 20 }}>
                  <div style={{ width: 36, height: 36, borderRadius: "50%", background: "linear-gradient(135deg,#1a1a2e,#16213e)", display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid #c9a96e33", fontSize: 14, color: "#c9a96e" }}>∞</div>
                  <div style={{ background: "rgba(15,15,25,0.9)", border: "1px solid rgba(201,169,110,0.2)", borderRadius: "4px 18px 18px 18px" }}>
                    <TypingIndicator />
                  </div>
                </div>
              )}
              <div ref={messagesEndRef} />
            </div>
          </div>
          <div style={{ padding: "16px 20px", background: "rgba(0,0,0,0.5)", borderTop: "1px solid rgba(201,169,110,0.15)", backdropFilter: "blur(20px)" }}>
            <div style={{ maxWidth: 760, margin: "0 auto", display: "flex", gap: 12 }}>
              <textarea value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (input.trim()) sendMessage(input.trim()); } }}
                placeholder="Posez votre question sur votre PEA… (Entrée pour envoyer)" rows={2}
                style={{ flex: 1, background: "rgba(15,15,25,0.8)", border: "1px solid rgba(201,169,110,0.3)", borderRadius: 12, padding: "12px 16px", color: "#e8e0d0", fontSize: 14, fontFamily: "inherit", lineHeight: 1.5, resize: "none" }} />
              <button onClick={() => { if (input.trim()) sendMessage(input.trim()); }} disabled={loading || !input.trim()}
                style={{ width: 48, height: 48, alignSelf: "flex-end", background: input.trim() && !loading ? "linear-gradient(135deg,#c9a96e,#8b6914)" : "rgba(201,169,110,0.2)", border: "none", borderRadius: 12, cursor: input.trim() && !loading ? "pointer" : "not-allowed", fontSize: 18, color: input.trim() && !loading ? "#000" : "#666" }}>↑</button>
            </div>
          </div>
        </div>
      )}
      {/* ── MODAL TEST DES SOURCES ── */}
      {showTestPanel && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(6px)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={e => { if (e.target === e.currentTarget) setShowTestPanel(false); }}>
          <div style={{ background: "#0d1117", border: "1px solid rgba(106,142,201,0.4)", borderRadius: 16, padding: "28px 32px", minWidth: 420, maxWidth: 540, boxShadow: "0 20px 60px rgba(0,0,0,0.6)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 22 }}>
              <div>
                <div style={{ fontSize: 15, fontWeight: "bold", color: "#6a8ec9", letterSpacing: "0.06em" }}>🧪 TEST DES SOURCES DE PRIX</div>
                <div style={{ fontSize: 11, color: "#555", marginTop: 3 }}>Ticker de référence : CW8 (MSCI World PEA)</div>
              </div>
              <button onClick={() => setShowTestPanel(false)}
                style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "4px 10px", cursor: "pointer", color: "#888", fontSize: 13, fontFamily: "inherit" }}>
                ✕
              </button>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
              {[
                { name: "Yahoo Finance (query2)", desc: "JSON API via corsproxy.io" },
                { name: "Euronext Live API",      desc: "API Euronext Paris via corsproxy.io" },
                { name: "Boursorama (scraping)",  desc: "HTML scraping via corsproxy.io" },
              ].map(({ name, desc }) => {
                const r = testResults?.[name];
                return (
                  <div key={name} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ fontSize: 22, width: 28, textAlign: "center", flexShrink: 0 }}>
                      {!r && testRunning ? "⏳" : r?.ok ? "✅" : r ? "❌" : "–"}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, color: r?.ok ? "#4a9e6b" : r ? "#e05555" : "#888", fontWeight: "bold" }}>{name}</div>
                      <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{desc}</div>
                      {r?.ok && (
                        <div style={{ fontSize: 12, color: "#c9a96e", marginTop: 4, fontFamily: "monospace" }}>
                          Prix : {r.price?.toFixed(2)} € · {r.ms}ms
                        </div>
                      )}
                      {r && !r.ok && (
                        <div style={{ fontSize: 11, color: "#e05555aa", marginTop: 4, wordBreak: "break-word" }}>
                          {r.error} · {r.ms}ms
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {testResults && !testRunning && (
              <div style={{ fontSize: 12, color: "#888", marginBottom: 14, padding: "10px 14px", background: "rgba(255,255,255,0.03)", borderRadius: 8, borderLeft: "3px solid " + (Object.values(testResults).some(r => r.ok) ? "#4a9e6b" : "#e05555") }}>
                {(() => {
                  const ok = Object.values(testResults).filter(r => r.ok).length;
                  const total = Object.keys(testResults).length;
                  if (ok === 0) return "⛔ Aucune source disponible. Vérifiez votre connexion internet ou la politique CORS de votre navigateur.";
                  if (ok === total) return `✅ Toutes les sources fonctionnent — les prix live seront la médiane de ${ok} sources.`;
                  return `⚠️ ${ok}/${total} sources disponibles — les prix live seront basés sur ${ok === 1 ? "la seule source disponible" : "la médiane des sources OK"}.`;
                })()}
              </div>
            )}

            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button onClick={() => { setTestResults(null); runSourceTests(); }} disabled={testRunning}
                style={{ background: testRunning ? "rgba(106,142,201,0.15)" : "rgba(106,142,201,0.2)", border: "1px solid rgba(106,142,201,0.4)", borderRadius: 8, padding: "8px 18px", cursor: testRunning ? "not-allowed" : "pointer", color: testRunning ? "#555" : "#6a8ec9", fontSize: 13, fontFamily: "inherit" }}>
                {testRunning ? "⏳ Test en cours…" : "↻ Relancer"}
              </button>
              <button onClick={() => setShowTestPanel(false)}
                style={{ background: "rgba(201,169,110,0.12)", border: "1px solid rgba(201,169,110,0.3)", borderRadius: 8, padding: "8px 18px", cursor: "pointer", color: "#c9a96e", fontSize: 13, fontFamily: "inherit" }}>
                Fermer
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PEAAgent />);
</script>
</body>
</html>
